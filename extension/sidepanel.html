<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoDriver</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --indigo: #6366f1;
      --indigo-light: #818cf8;
      --indigo-dim: rgba(99,102,241,0.15);
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --radius: 10px;
      --radius-sm: 6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .logo span { color: var(--indigo-light); }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }

    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.connecting { background: var(--amber); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Mode toggle ── */
    .mode-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .mode-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .mode-toggle {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      background: var(--surface2);
      padding: 4px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .mode-btn {
      padding: 6px 4px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--text-muted);
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .mode-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .mode-btn.active {
      background: var(--indigo);
      color: #fff;
      box-shadow: 0 1px 8px rgba(99,102,241,0.4);
    }

    /* ── Scrollable content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Section ── */
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .badge {
      background: var(--indigo);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      min-width: 18px;
      text-align: center;
    }

    .badge.hidden { display: none; }

    /* ── Pending actions ── */
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 16px 0;
    }

    .pending-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }

    .pending-card:last-child { margin-bottom: 0; }

    .pending-card.highlight { border-color: var(--indigo); }

    .pending-action-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--indigo-light);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .pending-desc {
      color: var(--text);
      font-size: 12.5px;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .pending-desc code {
      background: rgba(255,255,255,0.07);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11.5px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .pending-timer {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .action-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .btn {
      padding: 7px 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn-approve {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .btn-approve:hover {
      background: rgba(34, 197, 94, 0.25);
      border-color: var(--green);
    }

    .btn-block {
      background: rgba(239, 68, 68, 0.12);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .btn-block:hover {
      background: rgba(239, 68, 68, 0.22);
      border-color: var(--red);
    }

    /* ── Action log ── */
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .log-entry {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .log-entry:hover { border-color: var(--border); }

    .log-icon {
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .log-body { flex: 1; min-width: 0; }

    .log-action {
      font-size: 11px;
      font-weight: 600;
      color: var(--indigo-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .log-detail {
      font-size: 11.5px;
      color: var(--text-dim);
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-time {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .log-status-approved { border-left: 2px solid var(--green); }
    .log-status-blocked { border-left: 2px solid var(--red); }
    .log-status-executed { border-left: 2px solid var(--indigo); }
    .log-status-error { border-left: 2px solid var(--amber); }

    /* ── Footer ── */
    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .ask-ai-btn {
      width: 100%;
      padding: 10px;
      background: var(--indigo-dim);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: var(--radius);
      color: var(--indigo-light);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .ask-ai-btn:hover {
      background: rgba(99,102,241,0.25);
      border-color: var(--indigo);
      color: #fff;
    }

    .ask-ai-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">🚗 Co<span>Driver</span></span>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- Mode toggle -->
  <div class="mode-section">
    <div class="mode-label">Control Mode</div>
    <div class="mode-toggle">
      <button class="mode-btn" data-mode="human">Human 🧑</button>
      <button class="mode-btn active" data-mode="copilot">Co-Pilot 🤝</button>
      <button class="mode-btn" data-mode="ai">AI 🤖</button>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="content">

    <!-- Pending actions -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Pending Actions</span>
        <span class="badge hidden" id="pendingBadge">0</span>
      </div>
      <div id="pendingList">
        <div class="empty-state">No pending AI actions</div>
      </div>
    </div>

    <!-- Action log -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Action Log</span>
        <button class="btn" style="font-size:10px;padding:2px 8px;background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid var(--border)" id="clearLogBtn">Clear</button>
      </div>
      <div class="log-list" id="logList">
        <div class="empty-state">No actions yet</div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <button class="ask-ai-btn" id="askAiBtn" disabled title="Coming soon">
      ✨ Ask AI <span style="font-size:10px;opacity:0.6">(coming soon)</span>
    </button>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
